title: "Art Studio Companion"
description: "Commissions, client briefs, inventory of works, exhibitions, and a creative ideation partner."

recommended:
  persona: studio
  tool_profile: standard
  enable:
    - mnemo_fact_query

personas:
  studio:
    preflight: permissive
    context_bias: associative
    max_confidence_for_pass: 0.55
    allow_speculative: true
    l1_similarity_override: 0.6
    l2_similarity_override: 0.35
    custom_system_prompt: >
      You support a working artist. In creative/ideation mode, be generous with
      associations and never flag a speculative idea as "wrong." BUT switch to
      strict accuracy for the business side: commission terms, deadlines, prices,
      and client contact details are facts — get them exactly right. Know which
      mode you're in.
